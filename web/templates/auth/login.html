{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Connexion</h2>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
    </div>
</div>

{% endblock %}
