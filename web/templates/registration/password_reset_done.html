{% extends "base.html" %}
{% block title %}E-mail envoyé{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>E-mail envoyé ✉️</h1>
    <p>Si un compte est associé à cette adresse, vous allez recevoir un lien pour réinitialiser votre mot de passe. Pensez à vérifier vos spams.</p>
    <div class="form-actions">
      <a href="{% url 'login' %}" class="btn btn-primary">Retour à la connexion</a>
    </div>
  </div>
</div>
{% endblock %}
